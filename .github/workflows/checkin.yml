name: HDHive Check-in

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - ".github/workflows/checkin.yml"
      - "requirements.txt"
  schedule:
    # 每天北京时间上午 05:23 自动运行 (UTC 22:23)
    # 避开整点和半点，能显著提高被 GitHub 触发的优先级
    - cron: '23 21 * * *'

permissions:
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TZ: Asia/Shanghai
      HDHIVE_ACCOUNTS_JSON: ${{ secrets.HDHIVE_ACCOUNTS_JSON }}
      HDHIVE_SIGN_TYPE: ${{ vars.HDHIVE_SIGN_TYPE }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
      # Keep CI on the same browser mode as the verified local setup.
      HDHIVE_HEADLESS: "true"
      HDHIVE_TIMEZONE: "Asia/Shanghai"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run HDHive check-in
        timeout-minutes: 22
        run: python scripts/checkin.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hdhive-artifacts
          path: artifacts/
          if-no-files-found: ignore
